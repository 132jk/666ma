<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群友骰子王</title>
  <style>
    body {
      font-family: "微软雅黑", sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    .dice-container {
      width: 120px;
      height: 120px;
      margin: 30px auto;
      perspective: 1000px;
    }
    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s;
      background-color: white;
      border: 2px solid #333;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .dice-face {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      font-weight: bold;
      color: #333;
    }
    .front { transform: translateZ(60px); }
    .back { transform: rotateY(180deg) translateZ(60px); }
    .right { transform: rotateY(90deg) translateZ(60px); }
    .left { transform: rotateY(-90deg) translateZ(60px); }
    .top { transform: rotateX(90deg) translateZ(60px); }
    .bottom { transform: rotateX(-90deg) translateZ(60px); }
    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #333;
      margin: 5px;
    }
    .dots-1 { justify-content: center; align-items: center; }
    .dots-2 { justify-content: space-between; }
    .dots-2 .dot:nth-child(2) { align-self: flex-end; }
    .dots-3 { justify-content: space-between; }
    .dots-3 .dot:nth-child(2) { align-self: center; }
    .dots-3 .dot:nth-child(3) { align-self: flex-end; }
    .dots-4 { display: flex; justify-content: space-between; }
    .dots-4 .column { display: flex; flex-direction: column; justify-content: space-between; }
    .dots-5 { display: flex; justify-content: space-between; }
    .dots-5 .column { display: flex; flex-direction: column; justify-content: space-between; }
    .dots-5 .column:nth-child(2) { justify-content: center; }
    .dots-6 { display: flex; justify-content: space-between; }
    .dots-6 .column { display: flex; flex-direction: column; justify-content: space-between; }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    .history {
      margin-top: 30px;
      text-align: left;
    }
    .history h3 {
      text-align: center;
    }
    .history ul {
      list-style: none;
      padding: 0;
    }
    .history li {
      padding: 5px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>群友骰子王</h1>
  <div class="dice-container">
    <div class="dice" id="dice">
      <div class="dice-face front">
        <div class="dots-1"><div class="dot"></div></div>
      </div>
      <div class="dice-face back">
        <div class="dots-6">
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
      <div class="dice-face right">
        <div class="dots-3">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="dice-face left">
        <div class="dots-4">
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
      <div class="dice-face top">
        <div class="dots-2">
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="dice-face bottom">
        <div class="dots-5">
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="column">
            <div class="dot"></div>
          </div>
          <div class="column">
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button id="rollBtn">摇骰子</button>
  <div class="history">
    <h3>历史记录</h3>
    <ul id="historyList"></ul>
  </div>

  <script>
    const dice = document.getElementById('dice');
    const rollBtn = document.getElementById('rollBtn');
    const historyList = document.getElementById('historyList');
    let history = [];

    // 摇骰子逻辑
    function rollDice() {
      // 随机旋转动画
      const randomX = Math.floor(Math.random() * 10) * 90;
      const randomY = Math.floor(Math.random() * 10) * 90;
      dice.style.transform = `rotateX(${randomX}deg) rotateY(${randomY}deg)`;

      // 随机生成1-6的数字
      const result = Math.floor(Math.random() * 6) + 1;
      history.unshift(`[${new Date().toLocaleTimeString()}] 摇出了 ${result} 点`);
      if (history.length > 10) history.pop(); // 只保留最近10条记录
      updateHistory();

      // 模拟延迟后显示结果（增强体验）
      setTimeout(() => {
        // 根据结果调整骰子朝向（这里简化为固定显示对应面，实际可更细致）
        dice.style.transform = `rotateX(0deg) rotateY(0deg)`;
      }, 1000);
    }

    // 更新历史记录
    function updateHistory() {
      historyList.innerHTML = '';
      history.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        historyList.appendChild(li);
      });
    }

    // 绑定点击事件
    rollBtn.addEventListener('click', rollDice);

    // 初始化
    updateHistory();
  </script>
</body>
</html>
